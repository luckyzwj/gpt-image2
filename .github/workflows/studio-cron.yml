name: Studio Tasks Runner (5-min cron)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  trigger-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/studio/tasks/run
        run: |
          set -e
          http_code=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"limit":5}' \
            "https://img.gptimgprompts.com/api/studio/tasks/run?limit=5")
          echo "HTTP $http_code"
          cat /tmp/body.txt
          test "$http_code" -eq 200
